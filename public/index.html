<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Birdcam Live</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="logo">Birdcam Live</h1>
      <span class="live-pill">Live</span>
      <a href="/admin" class="admin-link">Admin</a>
    </header>

    <div class="main">
      <section class="video-section">
        <div class="camera-tabs" id="camera-tabs" role="tablist"></div>
        <div class="video-wrap">
          <video id="video" muted autoplay playsinline></video>
          <div class="video-overlay" id="video-overlay">
            <p>Pick a camera above or add one in Admin.</p>
          </div>
          <button type="button" class="info-btn" id="info-btn" title="Stream info">i</button>
          <div class="info-panel hidden" id="info-panel"></div>
        </div>
      </section>

      <aside class="chat-section">
        <h2 class="chat-title">Chat</h2>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-wrap">
          <input type="text" id="nickname" placeholder="Your name" maxlength="30" class="chat-nickname">
          <div class="chat-row">
            <input type="text" id="chat-input" placeholder="Say something..." maxlength="500" class="chat-input">
            <button type="button" id="emoji-btn" class="btn-emoji" title="Emoji">😊</button>
            <button type="button" id="chat-send" class="btn-send">Send</button>
          </div>
          <div id="emoji-picker" class="emoji-picker hidden"></div>
        </div>
      </aside>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>
  <script src="app.js"></script>
</body>
</html>
