# bird_tv app — viewer + admin + chat
# Nginx körs i egen container och proxar till bird_tv-appen.
# Backend: bird_tv-containern. Nginx måste vara på samma Docker-nätverk (t.ex. bird_cam_default)
# så att "birdcam" löses till rätt container. Service-namn från vår compose är "birdcam".
#
# Exempel: koppla din nginx-container till nätverket:
#   docker network connect bird_cam_default <din-nginx-container>
# eller kör båda i samma compose med samma network.
#
# Cloudflare proxy (orange moln):
#   - set_real_ip_from: litar på Cloudflares IP-ranges, loggar rätt klient-IP
#   - real_ip_header: hämtar riktig klient-IP från CF-Connecting-IP
#   - proxy_buffering off på /hls: hindrar nginx från att buffra live HLS-segments

upstream bird_tv_backend {
    server 172.16.200.100:7000;
}

# Cloudflare IPv4-ranges — uppdateras på https://www.cloudflare.com/ips-v4/
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
# Cloudflare IPv6-ranges
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;

real_ip_header CF-Connecting-IP;

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name *.slowtv.nu bird.slowtv.nu bird.*;

    include /config/nginx/ssl.conf;

    client_max_body_size 0;

    # HLS live-streaming — buffring avstängd för minimal latens
    location /hls {
        proxy_pass http://bird_tv_backend;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket for chat (must be before the general location)
    location /ws {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://bird_tv_backend;
    }

    # Everything else -> bird_tv app (/, /admin, /api, static)
    location / {
        proxy_pass http://bird_tv_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
