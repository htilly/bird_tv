services:
  birdcam:
    build:
      context: .
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      # Run motion detector as a second process inside the same container.
      - ENABLE_MOTION_DETECTOR=true
      - MOTION_RELAY_URL=ws://127.0.0.1:3000/motion-ws?role=detector
      # Optional: create first admin on first run
      # - ADMIN_USER=admin
      # - ADMIN_PASSWORD=changeme
      # SESSION_SECRET is auto-generated and persisted in the DB.
      # Only set this if you need a specific value or share sessions across instances.
      # - SESSION_SECRET=your-secret-here
    volumes:
      - birdcam-data:/app/data
    restart: unless-stopped

volumes:
  birdcam-data:
