services:
  birdcam:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      # Optional: create first admin on first run
      # - ADMIN_USER=admin
      # - ADMIN_PASSWORD=changeme
      # - SESSION_SECRET=your-random-secret
    volumes:
      - birdcam-data:/app/data
    restart: unless-stopped

volumes:
  birdcam-data:
